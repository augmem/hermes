name: cortext
version: 0.1.0
description: "Silent local Cortext memory and action interrupts; no model-visible tools."
hooks:
  - on_turn_start
  - prefetch
  - queue_prefetch
  - pre_tool_call
  - sync_turn
  - on_memory_write
  - on_delegation
  - on_pre_compress
  - on_session_end
  - on_session_switch
  - shutdown
